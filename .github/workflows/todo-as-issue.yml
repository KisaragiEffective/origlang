name: "Run TODO to Issue"
on:
    push:
        branches:
            - master
jobs:
    build:
        permissions:
            contents: read
            issues: write
        runs-on: "ubuntu-24.04"
        steps:
            -
                uses: "actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803" # v6
                with:
                    persist-credentials: false
            -
                  name: "TODO to Issue"
                  uses: "alstr/todo-to-issue-action@v5"
                  with:
                      AUTO_ASSIGN: true
